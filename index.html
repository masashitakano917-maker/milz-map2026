<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <title>MILZ — Tokyo / NY / Kyoto / Seoul / Hawaii curated city map</title>

    <link rel="canonical" href="https://milz-map.com/" />

    <link rel="alternate" hreflang="ja" href="https://milz-map.com/?lang=ja" />
    <link rel="alternate" hreflang="x-default" href="https://milz-map.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MILZ" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "MILZ",
        "url": "https://milz-map.com/",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Web",
        "inLanguage": ["ja", "en"],
        "description": "Curated map of trusted cafes, restaurants and hidden spots across Tokyo, New York, Kyoto, Seoul and Hawaii with ward and station filters, favorites and AI-picked trends.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "areaServed": [
          { "@type": "City", "name": "Tokyo" },
          { "@type": "City", "name": "New York" },
          { "@type": "City", "name": "Kyoto" },
          { "@type": "City", "name": "Seoul" },

        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "name": "MILZ",
        "url": "https://milz-map.com/",
        "logo": "https://milz-map.com/favicon.ico"
      }
    </script>
